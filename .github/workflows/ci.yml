name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2.4"

      - name: Run tests
        run: swift test

      - name: Build release CLI
        run: swift build -c release --product switcheroo

      - name: Build app bundle
        run: ./scripts/bundle_app.sh
