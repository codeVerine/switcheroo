name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Derive version
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release CLI
        run: swift build -c release --product switcheroo

      - name: Build app bundle
        run: ./scripts/bundle_app.sh

      - name: Package release artifacts
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          mkdir -p dist/release
          cp .build/release/switcheroo dist/release/switcheroo
          chmod +x dist/release/switcheroo
          tar -czf "dist/switcheroo-${VERSION}-macos-arm64.tar.gz" -C dist/release switcheroo
          rm -rf dist/dmg-root
          mkdir -p dist/dmg-root
          cp -R "dist/Switcheroo.app" dist/dmg-root/
          ln -s /Applications dist/dmg-root/Applications
          hdiutil create \
            -volname "Switcheroo ${VERSION}" \
            -srcfolder dist/dmg-root \
            -ov \
            -format UDZO \
            "dist/Switcheroo-${VERSION}-macos-arm64.dmg"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Switcheroo ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: |
            dist/switcheroo-${{ steps.meta.outputs.version }}-macos-arm64.tar.gz
            dist/Switcheroo-${{ steps.meta.outputs.version }}-macos-arm64.dmg
